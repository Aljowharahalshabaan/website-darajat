<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>دراجات النخبة</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #C9A84C;
      --gold-light: #E8C97A;
      --gold-dim: #8a6e30;
      --black: #080808;
      --black-soft: #111111;
      --black-card: #161616;
      --white: #f5f0e8;
      --white-dim: #a89e88;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Cairo', 'Tajawal', sans-serif;
      background: var(--black);
      color: var(--white);
      direction: rtl;
      overflow-x: hidden;
    }

    /* ─── Noise Texture Overlay ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* ─── HEADER ─── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 18px 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(to bottom, rgba(8,8,8,0.98) 60%, transparent);
      border-bottom: 1px solid rgba(201,168,76,0.12);
      backdrop-filter: blur(6px);
    }

    .header-inner {
      display: flex;
      align-items: center;
      gap: 14px;
    }


    .logo-icon {
      width: 70px; height: 70px;
      object-fit: contain;
      filter: drop-shadow(0 0 12px rgba(201,168,76,0.6));
      animation: floatLogo 4s ease-in-out infinite;
    }


    @keyframes floatLogo {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    .header-title {
      font-family: 'Tajawal', sans-serif;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 1px;
      background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dim));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ─── HERO ─── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 120px 24px 80px;
      position: relative;
      overflow: hidden;
    }

    /* Radial gold glow behind hero */
    .hero::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -55%);
      width: 700px; height: 700px;
      background: radial-gradient(ellipse, rgba(201,168,76,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Bike SVG Background Illustration */
    .hero-bg-bike {
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: min(900px, 100%);
      opacity: 0.04;
      pointer-events: none;
      user-select: none;
    }

    /* Gold horizontal rule */
    .gold-line {
      width: 80px; height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      margin: 20px auto;
      opacity: 0.8;
    }


    .hero-logo {
      width: clamp(130px, 28vw, 200px);
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 0 30px rgba(201,168,76,0.35));
      margin-bottom: 10px;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.1s forwards;
    }

    .hero-badge {
      display: inline-block;
      font-size: 0.72rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold);
      border: 1px solid rgba(201,168,76,0.3);
      padding: 6px 18px;
      border-radius: 50px;
      margin-bottom: 28px;
      font-family: 'Tajawal', sans-serif;
      font-weight: 500;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.2s forwards;
    }

    .hero-name {
      font-family: 'Tajawal', sans-serif;
      font-size: clamp(2.8rem, 9vw, 6rem);
      font-weight: 900;
      line-height: 1.1;
      background: linear-gradient(160deg, #ffffff 20%, var(--gold-light) 50%, var(--gold) 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.4s forwards;
      position: relative;
      z-index: 1;
    }

    .hero-tagline {
      font-size: clamp(1rem, 3vw, 1.4rem);
      color: var(--white-dim);
      font-weight: 300;
      letter-spacing: 1px;
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.6s forwards;
    }

    .hero-location {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--gold-dim);
      font-size: 0.92rem;
      letter-spacing: 0.5px;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.8s forwards;
    }

    .hero-location svg { flex-shrink: 0; }

    /* ─── CONTACT SECTION ─── */
    .contact-section {
      padding: 80px 24px 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .section-label {
      font-size: 0.7rem;
      letter-spacing: 5px;
      color: var(--gold);
      text-transform: uppercase;
      font-family: 'Tajawal', sans-serif;
      margin-bottom: 12px;
      opacity: 0;
      transition: opacity 0.6s ease, transform 0.6s ease;
      transform: translateY(20px);
    }

    .section-label.visible { opacity: 1; transform: translateY(0); }

    .contact-phone {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 700;
      font-family: 'Cairo', sans-serif;
      letter-spacing: 3px;
      color: var(--white);
      margin: 10px 0 36px;
      direction: ltr;
      text-align: center;
      opacity: 0;
      transition: opacity 0.6s ease 0.15s, transform 0.6s ease 0.15s;
      transform: translateY(20px);
    }

    .contact-phone.visible { opacity: 1; transform: translateY(0); }

    .contact-btns {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.6s ease 0.3s, transform 0.6s ease 0.3s;
      transform: translateY(20px);
    }

    .contact-btns.visible { opacity: 1; transform: translateY(0); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 36px;
      border-radius: 4px;
      font-family: 'Cairo', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      cursor: pointer;
      letter-spacing: 0.5px;
    }

    .btn-call {
      background: linear-gradient(135deg, var(--gold), var(--gold-dim));
      color: var(--black);
      box-shadow: 0 4px 24px rgba(201,168,76,0.25);
    }

    .btn-call:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(201,168,76,0.4);
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
    }

    .btn-whatsapp {
      background: transparent;
      color: var(--gold);
      border: 1.5px solid rgba(201,168,76,0.5);
    }

    .btn-whatsapp:hover {
      transform: translateY(-3px);
      border-color: var(--gold);
      background: rgba(201,168,76,0.06);
      box-shadow: 0 8px 32px rgba(201,168,76,0.1);
    }

    /* Divider */
    .section-divider {
      width: 100%;
      max-width: 700px;
      margin: 0 auto;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(201,168,76,0.2), transparent);
    }

    /* ─── FOOTER ─── */
    footer {
      padding: 32px 24px;
      text-align: center;
      border-top: 1px solid rgba(201,168,76,0.08);
      background: rgba(0,0,0,0.4);
    }

    .footer-logo {
      font-family: 'Tajawal', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--gold-light), var(--gold-dim));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .footer-copy {
      font-size: 0.75rem;
      color: rgba(165,155,135,0.5);
      letter-spacing: 1px;
    }

    /* ─── DECORATIVE BIKE SVG ─── */
    .deco-bikes {
      position: absolute;
      left: 0; right: 0;
      bottom: -20px;
      display: flex;
      justify-content: center;
      gap: 80px;
      pointer-events: none;
      user-select: none;
      opacity: 0.055;
    }

    /* ─── ANIMATIONS ─── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 600px) {
      header { padding: 14px 20px; }
      .btn { padding: 14px 24px; font-size: 0.9rem; }
    }
  </style>
</head>
